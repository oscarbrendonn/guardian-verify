<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>67 Guardian Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e14;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(212, 175, 55, 0.06) 0%, transparent 50%);
            z-index: 0;
        }

        /* 67 coin logo pattern background */
        .bg-pattern {
            position: fixed;
            top: -50px; left: -50px; right: -50px; bottom: -50px;
            z-index: 0;
            opacity: 0.06;
            background-image: url("67logo.png");
            background-size: 70px 70px;
            background-repeat: repeat;
            animation: bgFloat 30s linear infinite;
        }

        @keyframes bgFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-70px); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
        }

        /* 67 Coin Logo */
        .logo-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 
                0 0 30px rgba(212, 175, 55, 0.4),
                0 0 60px rgba(212, 175, 55, 0.15);
            animation: logoPulse 2.5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.4), 0 0 60px rgba(212, 175, 55, 0.15); }
            50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.6), 0 0 80px rgba(212, 175, 55, 0.25); }
        }

        .welcome-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .group-name {
            font-size: 15px;
            color: rgba(212, 175, 55, 0.6);
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0d060, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 36px;
            text-align: center;
        }

        /* Verify button — gold theme */
        .verify-btn {
            width: 100%;
            padding: 16px 32px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #f0d060, #d4af37, #b8962e);
            color: #000;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .verify-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .verify-btn:hover::before { left: 100%; }
        .verify-btn:active { transform: scale(0.98); }
        .verify-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .verify-btn.loading { pointer-events: none; }
        .verify-btn.loading .btn-text { visibility: hidden; }
        .verify-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 24px; height: 24px;
            margin: -12px 0 0 -12px;
            border: 3px solid rgba(0, 0, 0, 0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .verify-btn.success {
            background: linear-gradient(135deg, #00e676, #00c853);
            pointer-events: none;
        }

        /* Warning */
        .warning {
            margin-top: 32px;
            padding: 14px 18px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            background: rgba(212, 175, 55, 0.06);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }

        .warning-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .warning-text {
            font-size: 13px;
            color: rgba(212, 175, 55, 0.8);
            line-height: 1.4;
        }

        /* Footer */
        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: rgba(212, 175, 55, 0.35);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .footer-67 {
            font-size: 16px;
            font-weight: 900;
            color: rgba(212, 175, 55, 0.5);
        }

        /* Powered by line */
        .powered {
            margin-top: 8px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="container">
        <div class="logo-container">
            <img src="67logo_hd.png" alt="67 Coin">
        </div>

        <div class="welcome-text" id="welcomeText">Welcome</div>
        <div class="group-name" id="groupName"></div>

        <div class="title">67 Guardian</div>
        <div class="subtitle">Verify to join the community</div>

        <button class="verify-btn" id="verifyBtn" onclick="handleVerify()">
            <span class="btn-text">Click here to verify</span>
        </button>

        <div class="warning">
            <span class="warning-icon">🛡️</span>
            <span class="warning-text">We will never ask for your phone number, seed phrase, or any personal information</span>
        </div>

        <div class="footer">
            <span class="footer-67">67</span> Guardian
        </div>
        <div class="powered">Protecting the 67 community</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.body.style.backgroundColor = tg.themeParams.bg_color || '#0a0e14';

        const params = new URLSearchParams(window.location.search);
        const chatId = params.get('chat_id') || '';
        const groupName = params.get('group_name') || '';

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcomeText').textContent = `Welcome, ${user.first_name}`;
        }

        if (groupName) {
            document.getElementById('groupName').textContent = decodeURIComponent(groupName);
        }

        function handleVerify() {
            const btn = document.getElementById('verifyBtn');
            btn.classList.add('loading');

            setTimeout(() => {
                btn.classList.remove('loading');
                btn.classList.add('success');
                btn.querySelector('.btn-text').textContent = '✓ Verified';
                btn.querySelector('.btn-text').style.visibility = 'visible';

                setTimeout(() => {
                    const deepLink = `https://t.me/Guardian67bot?start=verified_${chatId}`;
                    tg.openTelegramLink(deepLink);
                    tg.close();
                }, 1000);
            }, 800);
        }
    </script>
</body>
</html>
