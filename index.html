<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>67 Guardian Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e14;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(212, 175, 55, 0.06) 0%, transparent 50%);
            z-index: 0;
        }

        /* 67 coin logo pattern background */
        .bg-pattern {
            position: fixed;
            top: -50px; left: -50px; right: -50px; bottom: -50px;
            z-index: 0;
            opacity: 0.06;
            background-image: url("67logo.png");
            background-size: 70px 70px;
            background-repeat: repeat;
            animation: bgFloat 30s linear infinite;
        }

        @keyframes bgFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-70px); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
        }

        /* 67 Coin Logo */
        .logo-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 
                0 0 30px rgba(212, 175, 55, 0.4),
                0 0 60px rgba(212, 175, 55, 0.15);
            animation: logoPulse 2.5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.4), 0 0 60px rgba(212, 175, 55, 0.15); }
            50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.6), 0 0 80px rgba(212, 175, 55, 0.25); }
        }

        .welcome-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .group-name {
            font-size: 15px;
            color: rgba(212, 175, 55, 0.6);
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0d060, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 36px;
            text-align: center;
        }

        /* Verify button — gold theme */
        .verify-btn {
            width: 100%;
            padding: 16px 32px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #f0d060, #d4af37, #b8962e);
            color: #000;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .verify-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .verify-btn:hover::before { left: 100%; }
        .verify-btn:active { transform: scale(0.98); }
        .verify-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .verify-btn.loading { pointer-events: none; }
        .verify-btn.loading .btn-text { visibility: hidden; }
        .verify-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 24px; height: 24px;
            margin: -12px 0 0 -12px;
            border: 3px solid rgba(0, 0, 0, 0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .verify-btn.success {
            background: linear-gradient(135deg, #00e676, #00c853);
            pointer-events: none;
        }

        .verify-btn.blocked {
            background: linear-gradient(135deg, #ff1744, #d50000);
            pointer-events: none;
        }

        /* Warning */
        .warning {
            margin-top: 32px;
            padding: 14px 18px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            background: rgba(212, 175, 55, 0.06);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }

        .warning-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .warning-text {
            font-size: 13px;
            color: rgba(212, 175, 55, 0.8);
            line-height: 1.4;
        }

        /* Footer */
        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: rgba(212, 175, 55, 0.35);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .footer-67 {
            font-size: 16px;
            font-weight: 900;
            color: rgba(212, 175, 55, 0.5);
        }

        /* Powered by line */
        .powered {
            margin-top: 8px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="container">
        <div class="logo-container">
            <img src="logo67.jpg" alt="67 Coin">
        </div>

        <div class="welcome-text" id="welcomeText">Welcome</div>
        <div class="group-name" id="groupName"></div>

        <div class="title">67 Guardian</div>
        <div class="subtitle">Verify to join the community</div>

        <button class="verify-btn" id="verifyBtn" onclick="handleVerify()">
            <span class="btn-text">Click here to verify</span>
        </button>

        <div class="warning">
            <span class="warning-text">⚠️ We will never ask for your phone number, seed phrase, or any personal information</span>
        </div>

        <div class="footer">
            <span class="footer-67">67</span> Guardian
        </div>
        <div class="powered">Protecting the 67 community</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.body.style.backgroundColor = tg.themeParams.bg_color || '#0a0e14';

        const params = new URLSearchParams(window.location.search);
        const chatId = params.get('chat_id') || '';
        const groupName = params.get('group_name') || '';

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcomeText').textContent = `Welcome, ${user.first_name}`;
        }

        if (groupName) {
            document.getElementById('groupName').textContent = decodeURIComponent(groupName);
        }

        /* ═══════════════════════════════════════════════════
           SECURITY LAYER — görünmez, arka planda çalışır
           ═══════════════════════════════════════════════════ */

        const _securityData = {};
        const _pageLoadTime = Date.now();
        let _interactionCount = 0;
        let _mouseMoves = [];
        let _touchEvents = [];

        // 1. Device Fingerprint — canvas + webgl + screen + platform
        async function _collectFingerprint() {
            try {
                const c = document.createElement('canvas');
                c.width = 200; c.height = 50;
                const ctx = c.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('G67fp_test', 2, 15);
                ctx.fillStyle = 'rgba(102,204,0,0.7)';
                ctx.fillText('G67fp_test', 4, 17);
                const canvasHash = c.toDataURL().slice(-60);

                let webglRenderer = 'none';
                try {
                    const gl = document.createElement('canvas').getContext('webgl');
                    if (gl) {
                        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
                        if (dbg) webglRenderer = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || 'unknown';
                    }
                } catch(e) {}

                const signals = {
                    cv: canvasHash,
                    sc: `${screen.width}x${screen.height}x${screen.colorDepth}`,
                    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    ln: navigator.language,
                    pf: navigator.platform,
                    cr: navigator.hardwareConcurrency || 0,
                    gl: webglRenderer.slice(0, 50),
                    tp: navigator.maxTouchPoints || 0,
                    dm: navigator.deviceMemory || 0,
                    dpr: window.devicePixelRatio || 1,
                };

                const raw = JSON.stringify(signals);
                const hashBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw));
                return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
            } catch(e) {
                return 'err_' + Math.random().toString(36).slice(2, 10);
            }
        }

        // 2. Bot Detection — headless/automation sinyalleri
        function _detectBot() {
            const flags = [];

            // webdriver flag
            if (navigator.webdriver) flags.push('wd');

            // headless Chrome
            if (/HeadlessChrome/.test(navigator.userAgent)) flags.push('hc');

            // phantom/selenium
            if (window._phantom || window.__nightmare || window.callPhantom) flags.push('ph');
            if (window.document.__selenium_unwrapped || window.document.__webdriver_evaluate) flags.push('se');

            // chrome olmadan chrome user-agent
            if (/Chrome/.test(navigator.userAgent) && !window.chrome) flags.push('fc');

            // permission anomaly
            try {
                if (navigator.permissions) {
                    navigator.permissions.query({name: 'notifications'}).then(r => {
                        if (Notification.permission === 'denied' && r.state === 'prompt') flags.push('pm');
                    }).catch(() => {});
                }
            } catch(e) {}

            // plugin sayısı (headless = 0)
            if (navigator.plugins && navigator.plugins.length === 0 && !/Mobile|Android|iPhone/.test(navigator.userAgent)) {
                flags.push('np');
            }

            // languages boş
            if (!navigator.languages || navigator.languages.length === 0) flags.push('nl');

            return flags;
        }

        // 3. Behavior Analysis — mouse/touch event tracking
        document.addEventListener('mousemove', (e) => {
            if (_mouseMoves.length < 20) {
                _mouseMoves.push({ x: e.clientX, y: e.clientY, t: Date.now() - _pageLoadTime });
            }
            _interactionCount++;
        }, { passive: true });

        document.addEventListener('touchstart', (e) => {
            if (_touchEvents.length < 10) {
                _touchEvents.push({ t: Date.now() - _pageLoadTime });
            }
            _interactionCount++;
        }, { passive: true });

        document.addEventListener('scroll', () => { _interactionCount++; }, { passive: true });

        // 4. Hız kontrolü — insanlar 800ms'den önce tıklayamaz
        function _getTimeOnPage() {
            return Date.now() - _pageLoadTime;
        }

        // 5. Behavior score hesapla
        function _calcBehaviorScore() {
            let score = 0;

            // Sayfada geçen süre (ms)
            const timeOnPage = _getTimeOnPage();
            if (timeOnPage > 2000) score += 20;    // 2sn+ = insan
            if (timeOnPage > 5000) score += 10;    // 5sn+ = kesin insan
            if (timeOnPage < 500) score -= 50;     // 0.5sn = kesin bot

            // Mouse hareketleri
            if (_mouseMoves.length > 3) score += 15;
            if (_mouseMoves.length > 10) score += 10;

            // Touch events (mobil)
            if (_touchEvents.length > 0) score += 15;

            // Genel etkileşim
            if (_interactionCount > 2) score += 10;
            if (_interactionCount > 10) score += 10;

            // Mouse hareket çeşitliliği (bot = düz çizgi)
            if (_mouseMoves.length >= 3) {
                const dx = new Set(_mouseMoves.map(m => Math.round(m.x / 20)));
                const dy = new Set(_mouseMoves.map(m => Math.round(m.y / 20)));
                if (dx.size > 2 && dy.size > 2) score += 10;  // çeşitli = insan
            }

            return Math.min(score, 100);
        }

        /* ═══════════════════════════════════════════════════
           VERIFY HANDLER — görünüm aynı, arka plan güçlü
           ═══════════════════════════════════════════════════ */

        async function handleVerify() {
            const btn = document.getElementById('verifyBtn');

            // Çift tıklama koruması
            if (btn.classList.contains('loading') || btn.classList.contains('success')) return;

            btn.classList.add('loading');

            try {
                // Paralel: fingerprint + bot check
                const [fingerprint, botFlags] = await Promise.all([
                    _collectFingerprint(),
                    Promise.resolve(_detectBot())
                ]);

                const behaviorScore = _calcBehaviorScore();
                const timeOnPage = _getTimeOnPage();

                // Security payload — deep link'e encode
                // fp: ilk 16 char fingerprint
                // bs: behavior score (0-100)
                // bf: bot flags (virgülle ayrılmış)
                // tp: time on page (ms)
                const fp = fingerprint.slice(0, 16);
                const bs = Math.min(behaviorScore, 99);
                const bf = botFlags.length > 0 ? botFlags.join('') : '0';

                // Deep link format: verified_CHATID_FPXXXXXXXXXXXXXX_BSXX_BFXXX
                const securitySuffix = `_fp${fp}_bs${bs}_bf${bf}`;

                // Bot detected = block
                if (botFlags.length >= 3 || behaviorScore < -20) {
                    btn.classList.remove('loading');
                    btn.classList.add('blocked');
                    btn.querySelector('.btn-text').textContent = '✗ Verification failed';
                    btn.querySelector('.btn-text').style.visibility = 'visible';
                    return;
                }

                // Çok hızlı tıklama = şüpheli ama geçir (bot tarafında kontrol edilecek)
                // Normal flow
                setTimeout(() => {
                    btn.classList.remove('loading');
                    btn.classList.add('success');
                    btn.querySelector('.btn-text').textContent = '✓ Verified';
                    btn.querySelector('.btn-text').style.visibility = 'visible';

                    setTimeout(() => {
                        const deepLink = `https://t.me/Guardian67bot?start=verified_${chatId}${securitySuffix}`;
                        tg.openTelegramLink(deepLink);
                        tg.close();
                    }, 1000);
                }, 800);

            } catch(e) {
                // Hata durumunda yine de geçir (UX bozulmasın)
                setTimeout(() => {
                    btn.classList.remove('loading');
                    btn.classList.add('success');
                    btn.querySelector('.btn-text').textContent = '✓ Verified';
                    btn.querySelector('.btn-text').style.visibility = 'visible';

                    setTimeout(() => {
                        const deepLink = `https://t.me/Guardian67bot?start=verified_${chatId}`;
                        tg.openTelegramLink(deepLink);
                        tg.close();
                    }, 1000);
                }, 800);
            }
        }
    </script>
</body>
</html>
